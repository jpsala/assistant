<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Prompt Editor</title>
    <style>
      :root {
        --bg-primary: #111322;
        --bg-input: #1a1c30;
        --bg-dropdown: #1e2038;
        --bg-hover: rgba(139, 92, 246, 0.18);
        --ink: #e0e0f0;
        --muted: #8b8fa6;
        --dim: #555770;
        --accent: #8b5cf6;
        --accent-hover: #7c4fe0;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --border: rgba(255, 255, 255, 0.08);
        --border-focus: rgba(139, 92, 246, 0.55);
        --radius: 8px;
        --font-ui: "Segoe UI Variable Text", "Segoe UI", sans-serif;
        --font-mono: "Consolas", "Fira Mono", monospace;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: radial-gradient(circle at top left, rgba(139, 92, 246, 0.1), transparent 30%),
                    linear-gradient(180deg, #17192b, var(--bg-primary));
        color: var(--ink);
        font-family: var(--font-ui);
        font-size: 13px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Titlebar ── */
      .titlebar {
        display: flex;
        align-items: center;
        height: 34px;
        padding: 0 4px 0 14px;
        -webkit-app-region: drag;
        user-select: none;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
      }

      .titlebar-title {
        flex: 1;
        font-size: 12px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.03em;
      }

      .titlebar-close {
        -webkit-app-region: no-drag;
        width: 34px;
        height: 28px;
        display: grid;
        place-items: center;
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        cursor: pointer;
        border-radius: 6px;
        transition: background 0.12s, color 0.12s;
      }

      .titlebar-close:hover {
        background: rgba(255, 70, 70, 0.8);
        color: #fff;
      }

      /* ── Content ── */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px 16px 0;
        overflow: hidden;
        min-height: 0;
      }

      .scroll-area {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding-bottom: 8px;
      }

      label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }

      label .hint { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--dim); }

      .section { margin-bottom: 10px; flex-shrink: 0; }
      .section.editor { flex: 1; display: flex; flex-direction: column; min-height: 0; }

      /* ── Inputs ── */
      input[type="text"], select, textarea {
        width: 100%;
        background: var(--bg-input);
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
        font-family: var(--font-ui);
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input[type="text"]:focus, select:focus, textarea:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
      }

      input::placeholder, textarea::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      select {
        cursor: pointer;
      }

      select option {
        background: var(--bg-dropdown);
        color: var(--ink);
      }

      textarea {
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.5;
        resize: vertical;
        min-height: 200px;
        flex: 1;
      }

      textarea.readonly {
        color: #666;
        background: rgba(255, 255, 255, 0.02);
      }

      /* ── Picker (prompt list + model dropdown) ── */
      .picker { position: relative; flex: 1; }

      .picker-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--bg-dropdown);
        border: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--radius) var(--radius);
        max-height: 200px;
        overflow-y: auto;
        z-index: 100;
        display: none;
      }

      .picker-dropdown.visible { display: block; }

      .dropdown-item {
        padding: 7px 10px;
        cursor: pointer;
        font-size: 13px;
        color: var(--ink);
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .dropdown-item:hover, .dropdown-item.active {
        background: var(--bg-hover);
        color: #fff;
      }

      .dropdown-item .tag {
        font-size: 11px;
        color: var(--accent);
        font-family: var(--font-mono);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .dropdown-item .model-id {
        font-family: var(--font-mono);
        font-size: 12px;
      }

      .dropdown-item .model-name {
        font-size: 11px;
        color: var(--dim);
        flex-shrink: 0;
      }

      /* ── Rows ── */
      .inline-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .inline-row .picker { flex: 1; }

      .hotkey-row input {
        flex: 1;
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 12px;
      }

      .hotkey-row input:focus { color: var(--muted); }

      .confirm-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .confirm-row input[type="checkbox"] {
        width: 14px;
        height: 14px;
        accent-color: var(--accent);
      }

      .confirm-row label {
        font-size: 12px;
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
        margin: 0;
        cursor: pointer;
      }

      /* ── Buttons ── */
      .btn-icon {
        padding: 6px 10px;
        font-size: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-input);
        color: var(--muted);
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
        flex-shrink: 0;
      }

      .btn-icon:hover { background: var(--bg-hover); color: var(--ink); }

      /* ── Footer ── */
      .footer {
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        padding: 10px 16px 12px;
      }

      .button-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .spacer { flex: 1; }

      button {
        padding: 8px 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-input);
        color: var(--ink);
        font-family: var(--font-ui);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        outline: none;
        transition: background 0.12s, opacity 0.12s;
      }

      button:hover { background: var(--bg-hover); }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      button.primary:hover { background: var(--accent-hover); }

      button.danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }

      button.danger:hover { background: var(--danger-hover); }
      button:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

      #status {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }

      #status[data-kind="ok"] { color: #3ddc97; }
      #status[data-kind="error"] { color: var(--danger); }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <span class="titlebar-title">Prompt Editor</span>
      <button class="titlebar-close" id="titlebar-close" title="Close">&#x2715;</button>
    </div>

    <div class="content">
      <div class="scroll-area">
        <!-- Prompt selector -->
        <div class="section">
          <label>Prompt <span class="hint">— type to filter</span></label>
          <div class="picker">
            <input type="text" id="prompt-filter" autocomplete="off" placeholder="Search prompts..." />
            <div id="prompt-dropdown" class="picker-dropdown"></div>
          </div>
        </div>

        <!-- Name -->
        <div class="section">
          <label>Name</label>
          <input type="text" id="prompt-name" placeholder="Prompt name..." />
        </div>

        <!-- Provider -->
        <div class="section">
          <label>Provider <span class="hint">(blank = app default)</span></label>
          <select id="prompt-provider">
            <option value="">(Use app default)</option>
            <option value="openrouter">OpenRouter</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="xai">xAI</option>
          </select>
        </div>

        <!-- Model -->
        <div class="section">
          <label>Model <span class="hint">(blank = provider default) — type to filter</span></label>
          <div class="inline-row">
            <div class="picker">
              <input type="text" id="prompt-model" autocomplete="off" placeholder="Search models..." />
              <div id="model-dropdown" class="picker-dropdown"></div>
            </div>
            <button class="btn-icon" id="btn-clear-model" title="Clear model">&#x2715;</button>
          </div>
        </div>

        <!-- Hotkey -->
        <div class="section">
          <label>Hotkey <span class="hint">(click to record — supports chords like Alt+T &rarr; Y)</span></label>
          <div class="inline-row hotkey-row">
            <input type="text" id="prompt-hotkey" readonly placeholder="Click to set hotkey..." data-ahk-key="" />
            <button class="btn-icon" id="btn-clear-hotkey" title="Clear hotkey">&#x2715;</button>
          </div>
          <div class="confirm-row">
            <input type="checkbox" id="prompt-confirm" />
            <label for="prompt-confirm">Confirm prompt before running</label>
          </div>
        </div>

        <!-- Prompt text -->
        <div class="section editor">
          <label>Prompt text</label>
          <textarea id="prompt-text" placeholder="Enter prompt instructions..."></textarea>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="button-row">
        <button class="primary" id="btn-save">Save <span style="opacity:0.5">(Ctrl+S)</span></button>
        <button id="btn-new">New</button>
        <button class="danger" id="btn-delete" disabled>Delete</button>
        <span class="spacer"></span>
        <button id="btn-close">Close</button>
      </div>
      <div id="status" data-kind="idle">Select a prompt to edit</div>
    </div>

    <script type="module" src="index.ts"></script>
  </body>
</html>
