<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Prompt Chat</title>
    <style>
      :root {
        --bg-1: #111322;
        --bg-2: #17192b;
        --panel: rgba(255, 255, 255, 0.04);
        --line: rgba(255, 255, 255, 0.08);
        --ink: #edf1ff;
        --muted: #98a0be;
        --dim: #6a718e;
        --accent: #8b5cf6;
        --accent-2: #132d45;
        --assistant: #24273b;
        --user: #12374f;
        --radius: 14px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(139, 92, 246, 0.16), transparent 30%),
          linear-gradient(180deg, var(--bg-2), var(--bg-1));
        color: var(--ink);
        font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
        font-size: 14px;
      }
      body {
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .titlebar {
        display: flex;
        align-items: center;
        height: 34px;
        padding: 0 4px 0 14px;
        border-bottom: 1px solid var(--line);
      }
      .titlebar-drag {
        flex: 1;
        height: 100%;
        display: flex;
        align-items: center;
      }
      .titlebar-title {
        font-size: 12px;
        font-weight: 600;
        color: rgba(255,255,255,0.45);
        letter-spacing: 0.03em;
      }
      .titlebar-close {
        width: 34px;
        height: 28px;
        border: none;
        background: transparent;
        color: rgba(255,255,255,0.4);
        border-radius: 6px;
        cursor: pointer;
      }
      .titlebar-close:hover {
        background: rgba(255, 70, 70, 0.8);
        color: #fff;
      }
      .shell {
        min-height: 0;
        padding: 14px 16px 0;
        display: grid;
        gap: 12px;
        grid-template-rows: auto 1fr;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }
      .card-title {
        padding: 10px 12px 8px;
        border-bottom: 1px solid var(--line);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        background: rgba(255,255,255,0.03);
      }
      #original-text {
        width: 100%;
        min-height: 110px;
        max-height: 180px;
        padding: 10px 12px 12px;
        border: none;
        outline: none;
        resize: vertical;
        background: rgba(255,255,255,0.04);
        color: var(--ink);
        font-family: "Consolas", "Fira Mono", monospace;
        line-height: 1.45;
      }
      .chat-shell {
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }
      .chat-header {
        padding: 10px 12px 8px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .chat-meta {
        font-size: 12px;
        color: var(--muted);
      }
      .chat-history {
        min-height: 0;
        overflow-y: auto;
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .message-row { display: flex; }
      .message-row.user { justify-content: flex-end; }
      .message-row.assistant { justify-content: flex-start; }
      .bubble {
        max-width: min(80%, 760px);
        border-radius: 12px;
        padding: 10px 12px;
        white-space: pre-wrap;
        line-height: 1.45;
        font-size: 13px;
      }
      .message-row.user .bubble {
        background: var(--user);
        color: #e8f6ff;
        border-bottom-right-radius: 4px;
      }
      .message-row.assistant .bubble {
        background: var(--assistant);
        color: var(--ink);
        border: 1px solid rgba(255,255,255,0.06);
        border-bottom-left-radius: 4px;
      }
      .message-meta {
        font-size: 11px;
        color: var(--dim);
        margin-top: 6px;
      }
      .composer {
        border-top: 1px solid var(--line);
        padding: 12px;
        display: grid;
        gap: 8px;
      }
      .composer-box { position: relative; }
      #composer-input {
        width: 100%;
        min-height: 92px;
        background: rgba(255,255,255,0.04);
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        line-height: 1.4;
        resize: vertical;
        outline: none;
      }
      #composer-input:focus, #original-text:focus {
        border-color: rgba(139, 92, 246, 0.55);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
      }
      .slash-dropdown {
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(100% + 6px);
        background: #1d2034;
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 10px 24px rgba(0,0,0,0.28);
        max-height: 220px;
        overflow-y: auto;
        display: none;
        z-index: 25;
      }
      .slash-dropdown.visible { display: block; }
      .slash-item {
        padding: 8px 10px;
        cursor: pointer;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }
      .slash-item:last-child { border-bottom: none; }
      .slash-item:hover, .slash-item.active { background: rgba(139, 92, 246, 0.16); }
      .slash-name { font-size: 13px; color: var(--ink); margin-bottom: 3px; }
      .slash-meta { font-size: 11px; color: var(--dim); font-family: "Consolas", monospace; }
      .composer-footer {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .spacer { flex: 1; }
      #status { font-size: 12px; color: var(--muted); }
      button {
        padding: 8px 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255,255,255,0.05);
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }
      button:hover { background: rgba(255,255,255,0.1); }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        font-weight: 600;
      }
      .footer {
        position: relative;
        border-top: 1px solid var(--line);
        background: rgba(10, 12, 20, 0.72);
        backdrop-filter: blur(12px);
        padding: 10px 16px 12px;
      }
      .footer-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding-right: 24px;
      }
      .footer-meta {
        color: var(--muted);
        font-size: 12px;
      }
      .resize-grip {
        position: absolute;
        right: 8px;
        bottom: 6px;
        width: 20px;
        height: 20px;
        border: 0;
        background: transparent;
        cursor: nwse-resize;
        opacity: 0.6;
      }
      .resize-grip::before {
        content: "";
        position: absolute;
        inset: 4px 3px 3px 4px;
        background:
          linear-gradient(135deg, transparent 0 52%, rgba(255,255,255,0.7) 52% 58%, transparent 58% 100%),
          linear-gradient(135deg, transparent 0 70%, rgba(255,255,255,0.52) 70% 76%, transparent 76% 100%),
          linear-gradient(135deg, transparent 0 87%, rgba(255,255,255,0.34) 87% 93%, transparent 93% 100%);
      }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <div class="titlebar-drag electrobun-webkit-app-region-drag">
        <span class="titlebar-title">Prompt Chat</span>
      </div>
      <button class="titlebar-close" id="titlebar-close" title="Close">&#x2715;</button>
    </div>

    <div class="shell">
      <div class="card">
        <div class="card-title">Original Text</div>
        <textarea id="original-text" spellcheck="false" readonly></textarea>
      </div>

      <div class="chat-shell">
        <div class="chat-header">
          <div class="chat-meta" id="session-meta">Conversation</div>
          <div class="chat-meta">First line can be `/prompt name` · Enter sends · Shift+Enter newline</div>
        </div>
        <div class="chat-history" id="chat-history"></div>
        <div class="composer">
          <div class="composer-box">
            <div class="slash-dropdown" id="slash-dropdown"></div>
            <textarea id="composer-input" spellcheck="false" placeholder="Write the next instruction..."></textarea>
          </div>
          <div class="composer-footer">
            <button class="primary" id="btn-send">Send</button>
            <button id="btn-new-chat">New Chat</button>
            <button id="btn-copy">Copy Latest</button>
            <button id="btn-replace">Replace Selected Text</button>
            <span class="spacer"></span>
            <div id="status">Ready</div>
            <button id="btn-close">Close</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-inner">
        <div class="footer-meta">Prompt chat uses the selected text as context for the conversation.</div>
      </div>
      <button class="resize-grip" id="resize-grip" type="button" title="Resize window" aria-label="Resize window"></button>
    </div>

    <script type="module" src="index.ts"></script>
  </body>
</html>
