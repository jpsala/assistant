<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Prompt Picker</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        background:
          radial-gradient(circle at top left, rgba(120, 119, 198, 0.18), transparent 34%),
          linear-gradient(180deg, #17192b, #111322 72%);
        color: #e0e0f0;
        font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
        font-size: 14px;
        overflow: hidden;
      }

      body {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
      }

      /* ── Custom titlebar ── */
      .titlebar {
        display: flex;
        align-items: center;
        height: 34px;
        padding: 0 4px 0 14px;
        user-select: none;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .titlebar-drag {
        flex: 1;
        height: 100%;
        display: flex;
        align-items: center;
      }

      .titlebar-title {
        font-size: 12px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.03em;
      }

      .titlebar-close {
        -webkit-app-region: no-drag;
        width: 34px;
        height: 28px;
        display: grid;
        place-items: center;
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        cursor: pointer;
        border-radius: 6px;
        transition: background 0.12s, color 0.12s;
      }

      .titlebar-close:hover {
        background: rgba(255, 70, 70, 0.8);
        color: #fff;
      }

      /* ── Search bar ── */
      #search-wrapper {
        padding: 10px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        position: relative;
      }

      #search-wrapper::before {
        content: "⌕";
        position: absolute;
        left: 28px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.3);
        font-size: 18px;
        pointer-events: none;
      }

      #search {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        color: #fff;
        font-size: 16px;
        padding: 9px 12px 9px 36px;
        outline: none;
        transition: border-color 0.15s;
      }

      #search:focus {
        border-color: rgba(139, 92, 246, 0.6);
        background: rgba(255, 255, 255, 0.09);
      }

      #search::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }

      /* ── List ── */
      #list {
        overflow-y: auto;
        padding: 6px 0;
        min-height: 0;
      }

      #list::-webkit-scrollbar {
        width: 4px;
      }

      #list::-webkit-scrollbar-track {
        background: transparent;
      }

      #list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 2px;
      }

      /* ── Item ── */
      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 16px;
        cursor: pointer;
        border-radius: 6px;
        margin: 1px 6px;
        transition: background 0.1s;
      }

      .item:hover {
        background: rgba(139, 92, 246, 0.18);
      }

      .item.selected {
        background: rgba(139, 92, 246, 0.35);
      }

      .item-name {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
        color: #e8e8f8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item-category {
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.45);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .item-hotkey {
        font-size: 11px;
        font-family: "Consolas", "Fira Mono", monospace;
        color: rgba(255, 255, 255, 0.28);
        white-space: nowrap;
        flex-shrink: 0;
        letter-spacing: 0.02em;
      }

      /* ── Empty state ── */
      #empty {
        text-align: center;
        color: rgba(255, 255, 255, 0.25);
        padding: 48px 24px;
        font-size: 14px;
        line-height: 1.6;
        display: grid;
        place-items: center;
        min-height: 0;
      }

      .list-shell {
        min-height: 0;
        overflow: hidden;
        display: grid;
      }

      /* ── Busy overlay ── */
      #busy {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(9, 11, 20, 0.58);
        backdrop-filter: blur(16px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s ease;
      }

      #busy.visible {
        opacity: 1;
      }

      .busy-card {
        width: min(420px, calc(100vw - 36px));
        padding: 18px 18px 16px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          radial-gradient(circle at top right, rgba(139, 92, 246, 0.2), transparent 34%),
          rgba(10, 14, 28, 0.82);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.34);
      }

      .busy-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(225, 232, 255, 0.8);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .busy-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #8b5cf6;
        box-shadow: 0 0 14px rgba(139, 92, 246, 0.8);
        animation: pulse 1s ease-in-out infinite;
      }

      .busy-title {
        margin-top: 14px;
        color: #f5f7ff;
        font-size: 18px;
        font-weight: 700;
      }

      .busy-meta {
        margin-top: 6px;
        color: rgba(220, 227, 247, 0.68);
        font-size: 13px;
      }

      .busy-bar {
        margin-top: 16px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .busy-bar::after {
        content: "";
        display: block;
        width: 34%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(139, 92, 246, 0.2), #8b5cf6, rgba(255, 255, 255, 0.24));
        animation: sweep 1.15s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.72; }
        50% { transform: scale(1.18); opacity: 1; }
      }

      @keyframes sweep {
        0% { transform: translateX(-18%); }
        50% { transform: translateX(205%); }
        100% { transform: translateX(-18%); }
      }

      .footer {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        background: rgba(9, 11, 20, 0.56);
        backdrop-filter: blur(12px);
      }

      .footer-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
      }

      .keyhint {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }

      .keyhint kbd {
        padding: 2px 7px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.88);
        font-family: "Consolas", "Fira Mono", monospace;
        font-size: 11px;
      }

      .footer-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-right: 22px;
      }

      .footer-button {
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: #eef2ff;
        border-radius: 9px;
        padding: 8px 12px;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, opacity 0.12s;
      }

      .footer-button:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .footer-button.primary {
        background: rgba(139, 92, 246, 0.88);
        border-color: rgba(139, 92, 246, 1);
      }

      .footer-button.primary:hover {
        background: rgba(139, 92, 246, 1);
      }

      .footer-button:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .resize-grip {
        position: absolute;
        right: 8px;
        bottom: 6px;
        width: 20px;
        height: 20px;
        border: 0;
        background: transparent;
        cursor: nwse-resize;
        opacity: 0.6;
      }

      .resize-grip::before {
        content: "";
        position: absolute;
        inset: 4px 3px 3px 4px;
        background:
          linear-gradient(135deg, transparent 0 52%, rgba(255, 255, 255, 0.7) 52% 58%, transparent 58% 100%),
          linear-gradient(135deg, transparent 0 70%, rgba(255, 255, 255, 0.52) 70% 76%, transparent 76% 100%),
          linear-gradient(135deg, transparent 0 87%, rgba(255, 255, 255, 0.34) 87% 93%, transparent 93% 100%);
      }

      .resize-grip:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <div class="titlebar-drag electrobun-webkit-app-region-drag">
        <span class="titlebar-title">Prompt Picker</span>
      </div>
      <button class="titlebar-close" id="titlebar-close" title="Close">&#x2715;</button>
    </div>
    <div id="search-wrapper">
      <input
        id="search"
        type="text"
        placeholder="Search prompts…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <div class="list-shell">
      <div id="list"></div>
      <div id="empty" style="display: none">No prompts found</div>
    </div>
    <div class="footer">
      <div class="footer-meta">
        <span class="keyhint"><kbd>↑↓</kbd><span>Navigate</span></span>
        <span class="keyhint"><kbd>Enter</kbd><span>Run</span></span>
        <span class="keyhint"><kbd>Esc</kbd><span>Close</span></span>
      </div>
      <div class="footer-actions">
        <button class="footer-button" id="footer-close" type="button">Close</button>
        <button class="footer-button primary" id="footer-run" type="button">Run Prompt</button>
      </div>
      <button class="resize-grip" id="resize-grip" type="button" title="Resize window" aria-label="Resize window"></button>
    </div>
    <div id="busy" aria-hidden="true">
      <div class="busy-card">
        <div class="busy-chip">
          <span class="busy-dot"></span>
          Processing
        </div>
        <div class="busy-title" id="busy-title">Running prompt</div>
        <div class="busy-meta" id="busy-meta">Capturing selection and sending it to the model</div>
        <div class="busy-bar"></div>
      </div>
    </div>

    <script type="module" src="index.ts"></script>
  </body>
</html>
