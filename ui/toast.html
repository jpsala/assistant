<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity</title>
<link rel="stylesheet" href="shared.css">
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #1a1c1f !important;
    border: none !important;
  }

  :root {
    --toast-bg: rgba(26, 28, 31, 0.94);
    --toast-border: rgba(255, 255, 255, 0.08);
    --toast-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
    --toast-accent: #4da3ff;
    --toast-success: #3fcf8e;
    --toast-error: #ff6a5e;
    --toast-info: #9aa7b3;
    --toast-working: #4da3ff;
  }

  body {
    background: #1a1c1f;
    border: none;
    overflow: hidden;
    user-select: none;
    display: block;
    border-radius: 14px;
  }

  .toast {
    margin: 0;
    width: 100%;
    height: 100%;
    min-height: 108px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--toast-border);
    background:
      radial-gradient(circle at top left, rgba(77, 163, 255, 0.10), transparent 38%),
      linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)),
      var(--toast-bg);
    box-shadow: var(--toast-shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    padding: 14px 15px 12px;
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 12px;
    opacity: 0;
    transform: translateY(12px) scale(0.985);
    transition: opacity 180ms ease, transform 220ms ease;
  }

  body.visible .toast {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .icon {
    width: 34px;
    height: 34px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    background: rgba(255,255,255,0.06);
    color: var(--toast-accent);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }

  body[data-type="success"] .icon { color: var(--toast-success); }
  body[data-type="error"] .icon { color: var(--toast-error); }
  body[data-type="info"] .icon { color: var(--toast-info); }
  body[data-type="working"] .icon { color: var(--toast-working); }

  .content {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .title {
    font-size: 14px;
    font-weight: 600;
    color: #f4f7fa;
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meta {
    font-size: 11px;
    color: #9fb4c8;
    font-family: var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .body {
    font-size: 12px;
    line-height: 1.45;
    color: #d7dfe7;
    min-height: 34px;
  }

  .progress {
    height: 4px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    position: relative;
  }

  .progress::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    transform: translateX(-65%);
    background: linear-gradient(90deg, transparent 0%, rgba(77, 163, 255, 0.15) 12%, rgba(77, 163, 255, 0.95) 48%, transparent 100%);
    animation: shimmer 1.25s ease-in-out infinite;
  }

  body[data-type="success"] .progress::before {
    background: linear-gradient(90deg, transparent 0%, rgba(63, 207, 142, 0.15) 12%, rgba(63, 207, 142, 0.95) 48%, transparent 100%);
    animation: none;
    transform: none;
  }

  body[data-type="error"] .progress::before {
    background: linear-gradient(90deg, transparent 0%, rgba(255, 106, 94, 0.15) 12%, rgba(255, 106, 94, 0.95) 48%, transparent 100%);
    animation: none;
    transform: none;
  }

  body[data-type="info"] .progress::before {
    background: linear-gradient(90deg, transparent 0%, rgba(154, 167, 179, 0.15) 12%, rgba(154, 167, 179, 0.85) 48%, transparent 100%);
    animation: none;
    transform: none;
  }

  @keyframes shimmer {
    0% { transform: translateX(-65%); }
    100% { transform: translateX(165%); }
  }
</style>
</head>
<body data-type="info">
  <div class="toast">
    <div id="icon" class="icon">i</div>
    <div class="content">
      <div id="title" class="title">AI Assistant</div>
      <div id="meta" class="meta"></div>
      <div id="body" class="body">Ready</div>
      <div class="progress"></div>
    </div>
  </div>

<script src="ahk-bridge.js"></script>
<script>
  const titleEl = document.getElementById('title');
  const metaEl = document.getElementById('meta');
  const bodyEl = document.getElementById('body');
  const iconEl = document.getElementById('icon');

  const ICONS = {
    working: '↻',
    success: '✓',
    error: '!',
    info: 'i'
  };

  function setToast(payload) {
    if (typeof payload === 'string') {
      payload = JSON.parse(payload);
    }
    const type = payload.type || 'info';
    document.body.dataset.type = type;
    document.body.classList.remove('visible');
    void document.body.offsetWidth;
    titleEl.textContent = payload.title || 'AI Assistant';
    metaEl.textContent = payload.meta || '';
    metaEl.style.display = payload.meta ? 'block' : 'none';
    bodyEl.textContent = payload.body || '';
    iconEl.textContent = ICONS[type] || ICONS.info;
    document.body.classList.add('visible');
  }

  function hideToast() {
    document.body.classList.remove('visible');
  }

  document.addEventListener('DOMContentLoaded', () => {
    postToAHK({ action: 'ready' });
  });
</script>
</body>
</html>
